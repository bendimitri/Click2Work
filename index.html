<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Click2Work conecta contratantes e trabalhadores em um marketplace de serviços moderno, visual e responsivo.">
  <title>Click2Work | Marketplace de Serviços</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="toastRoot" class="toast-root" aria-live="polite"></div>

  <div id="appShell">
    <header class="site-header" id="siteHeader">
      <a class="brand" href="#/" data-route="/">
        <span class="brand-mark">C2</span>
        <span>
          <strong>Click2Work</strong>
          <small>Click Two Work</small>
        </span>
      </a>

      <nav class="site-nav" aria-label="Navegação principal">
        <a href="#/explorar" data-route="/explorar">Explorar</a>
        <a href="#/auth/login" data-route="/auth/login">Entrar</a>
        <a href="#/auth/register" data-route="/auth/register">Cadastrar-se</a>
      </nav>

      <div class="header-actions">
        <button class="icon-button" id="themeToggle" type="button" aria-label="Alternar tema" title="Alternar tema">
          <i class="fa-solid fa-moon"></i>
        </button>
        <button class="menu-button" id="menuToggle" type="button" aria-label="Abrir menu">
          <i class="fa-solid fa-bars"></i>
        </button>
      </div>
    </header>

    <main id="app" tabindex="-1"></main>
  </div>

  <div class="modal-backdrop" id="modalRoot" hidden></div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
